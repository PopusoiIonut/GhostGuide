name: "Ghost Guide AR"
targets:
  "Ghost Guide AR":
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources: [Sources]
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        DEVELOPMENT_TEAM: M9NL4PJ9AL
        PRODUCT_BUNDLE_IDENTIFIER: com.yourcompany.GhostGuideAR
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "GhostGuide uses your location in the background to detect invisible tripwires around historical monuments."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "GhostGuide needs to see where you are to find nearby stories."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ACCENT_COLOR_NAME: AccentColor
