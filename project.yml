name: "Ghost Guide AR"
targets:
  "Ghost Guide AR":
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources: [Sources]
    info:
      path: Sources/Info.plist
      properties:
        UIBackgroundModes:
          - audio
          - location
        UIRequiresFullScreen: YES
    settings:
      base:
        DEVELOPMENT_TEAM: M9NL4PJ9AL
        PRODUCT_BUNDLE_IDENTIFIER: com.popusoiionut.GhostGuideAR
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocationAlwaysAndWhenInUseUsageDescription: "GhostGuide uses your location in the background to detect invisible tripwires around historical monuments."
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "GhostGuide needs to see where you are to find nearby stories."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ACCENT_COLOR_NAME: AccentColor
schemes:
  "Ghost Guide AR":
    build:
      targets:
        "Ghost Guide AR": all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
